workflows:
  android-release:
    name: Android APK Build

    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Fix Gradle Wrapper
        script: |
          # Ensure the gradle wrapper properties file exists and update it
          mkdir -p android/gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-all.zip" >> android/gradle/wrapper/gradle-wrapper.properties

      - name: Fix Kotlin and Gradle Build
        script: |
          # Ensure build.gradle exists and has correct versions
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version.*/ext.kotlin_version = "1.8.22"/g' android/build.gradle
            sed -i "s/classpath 'com.android.tools.build:gradle:.*/classpath 'com.android.tools.build:gradle:7.3.0'/g" android/build.gradle
          fi

      - name: Clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          # Build release APK with explicit v2 embedding support
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
