workflows:
  android-release:
    name: Android APK Build

    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Fix Gradle
        script: |
          # Ensure the gradle wrapper properties file exists and update it
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's/gradle-8.*/gradle-7.6-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Fix Kotlin
        script: |
          # Update Kotlin version in the root build.gradle if it exists
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version.*/ext.kotlin_version = "1.8.22"/g' android/build.gradle
          fi

      - name: Clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          # Build release APK for the Vidmate Clone project
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
