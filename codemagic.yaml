workflows:
  android-release:
    name: Android APK Build

    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Setup AndroidX and SDK 34
        script: |
          # Ensure gradle.properties has AndroidX enabled
          cat <<EOF > android/gradle.properties
          org.gradle.jvmargs=-Xmx1536M
          android.useAndroidX=true
          android.enableJetifier=true
          android.nonTransitiveRClass=true
          EOF

          # Ensure gradle-wrapper.properties is correct
          mkdir -p android/gradle/wrapper
          cat <<EOF > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-all.zip
          EOF

          # Update root build.gradle
          if [ -f android/build.gradle ]; then
            cat <<EOF > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.8.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          fi

      - name: Clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          # Build release APK with SDK 34 and AndroidX
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
