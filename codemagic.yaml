workflows:
  android-release:
    name: Android APK Build

    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Clean project
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Force SDK 34 (hard fix)
        script: |
          sed -i 's/compileSdkVersion 35/compileSdkVersion 34/g' android/app/build.gradle || true
          sed -i 's/compileSdk = 35/compileSdk = 34/g' android/app/build.gradle || true
          sed -i 's/targetSdkVersion 35/targetSdkVersion 34/g' android/app/build.gradle || true

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk